<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow Universal</title>

  <!-- Ethers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- WalletConnect v2 -->
  <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.10.0/dist/index.umd.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>ArcFlow</h1>
<p>Universal Wallet Support (Arc Testnet)</p>

<button onclick="connectInjected()">Connect Wallet</button>
<button onclick="connectWalletConnect()">WalletConnect</button>

<p id="status"></p>

<script>

// ===== CONFIG =====
const ARC_CHAIN_ID = 5042002;
const PROJECT_ID = "a0031066837361c93d02ae2f139acc98"; // your ID

let provider;
let signer;

// ===== INJECTED (MetaMask / Brave / OKX) =====
async function connectInjected() {
  try {
    if (!window.ethereum) {
      alert("No wallet found");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    const address = await signer.getAddress();

    document.getElementById("status").innerText =
      "Connected (Injected): " + address;

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

// ===== WALLETCONNECT v2 =====
async function connectWalletConnect() {
  try {

    const wcProvider = await window.EthereumProvider.init({
      projectId: PROJECT_ID,
      chains: [ARC_CHAIN_ID],
      showQrModal: true,
    });

    await wcProvider.enable();

    provider = new ethers.providers.Web3Provider(wcProvider);
    signer = provider.getSigner();

    const address = await signer.getAddress();

    document.getElementById("status").innerText =
      "Connected (WalletConnect): " + address;

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
</html>
