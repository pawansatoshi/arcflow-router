<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcFlow Pro</title>

<meta property="fc:frame" content='{"version":"next","imageUrl":"https://arcflow-router.vercel.app/frame.png?v=13","button":{"title":"Open ArcFlow","action":{"type":"launch_frame","name":"ArcFlow Pro","url":"https://arcflow-router.vercel.app"}}}' />

<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=13" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#11182b;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px 12px;margin:5px;background:#3b5cff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
input{width:100%;padding:10px;margin:5px 0;background:#0c1426;color:#fff;border:1px solid #1b2440;border-radius:6px}

.arc-container{display:flex;overflow-x:auto;gap:8px;padding-bottom:5px}
.arc{padding:10px 14px;background:#3b5cff;border-radius:20px;cursor:pointer;font-size:12px}
.icon{font-size:22px;margin:10px;cursor:pointer}

.tx-box{
  margin-top:10px;
  padding:10px;
  background:#0c1426;
  border-radius:8px;
  font-size:12px;
  word-break: break-all;
}
</style>
</head>

<body>

<h2>ArcFlow Pro</h2>

<!-- ARC LINKS -->
<div class="card">
<h3>Arc Ecosystem</h3>
<div class="arc-container">
  <div class="arc" onclick="go('https://faucet.circle.com')">Faucet</div>
  <div class="arc" onclick="go('https://discord.gg/buildonarc')">Discord</div>
  <div class="arc" onclick="go('https://arc.network')">Arc Hub</div>
  <div class="arc" onclick="go('https://community.arc.network/home')">House</div>
  <div class="arc" onclick="go('https://x.com/arc')">Arc X</div>
  <div class="arc" onclick="go('https://x.com/circle')">Circle X</div>
</div>
</div>

<!-- WALLET -->
<div class="card">
<button onclick="connect()">Connect</button>
<button onclick="switchArc()">Switch Arc</button>
<button onclick="switchWallet()">Switch Wallet</button>

<p id="addr">—</p>
<p id="bal">—</p>
<div id="status">Idle</div>
</div>

<!-- SEND -->
<div class="card">
<h3>Send USDC</h3>
<input id="to" placeholder="Recipient address"/>
<input id="amount" placeholder="Amount"/>
<button onclick="send()">Send</button>
</div>

<!-- SCANNER -->
<div class="card">
<h3>Arc Scanner</h3>
<input id="search" placeholder="Tx Hash"/>
<button onclick="scan()">Search</button>
<div id="result"></div>
</div>

<!-- ✅ NEW: WALLET SEARCH -->
<div class="card">
<h3>Wallet Balance (No Connect)</h3>
<input id="walletSearch" placeholder="Wallet address"/>
<button onclick="checkWallet()">Check</button>
<div id="walletResult"></div>
</div>

<!-- SOCIAL -->
<div class="card">
<h3>Connect</h3>
<i class="fab fa-x-twitter icon" onclick="go('https://x.com/pawansatoshix')"></i>
<i class="fab fa-github icon" onclick="go('https://github.com/pawansatoshi')"></i>
<i class="fab fa-youtube icon" onclick="go('https://youtube.com/@PawanSatoshi')"></i>
<i class="fab fa-telegram icon" onclick="go('https://t.me/pawansatoshi')"></i>
<i class="fas fa-envelope icon" onclick="go('mailto:pawansatoshi@gmail.com')"></i>
<i class="fab fa-discord icon" onclick="go('https://discord.com/channels/1214957080218435634/1214957080654512250')"></i>
</div>

<script>
const ARC_CHAIN = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

function go(u){window.open(u,"_blank")}
function copyText(t){navigator.clipboard.writeText(t)}
function shortHash(h){return h.slice(0,6)+"..."+h.slice(-4)}

async function connect(){
 provider = new ethers.providers.Web3Provider(window.ethereum);
 await provider.send("eth_requestAccounts",[]);
 signer = provider.getSigner();
 user = await signer.getAddress();
 document.getElementById("addr").innerText = shortHash(user);
 await loadBalance();
}

async function switchWallet(){
 try{
  await window.ethereum.request({
    method:"wallet_requestPermissions",
    params:[{eth_accounts:{}}]
  });
  await connect();
 }catch{
  document.getElementById("status").innerText="Switch manually in wallet";
 }
}

async function loadBalance(){
 const contract = new ethers.Contract(USDC,[
  "function balanceOf(address) view returns(uint256)"
 ],provider);

 const bal = await contract.balanceOf(user);
 document.getElementById("bal").innerText =
  ethers.utils.formatUnits(bal, DECIMALS)+" USDC";
}

async function send(){
 try{
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value.trim();

  const contract = new ethers.Contract(USDC,[
    "function transfer(address,uint256) returns(bool)"
  ],signer);

  const tx = await contract.transfer(
    to,
    ethers.utils.parseUnits(amount, DECIMALS)
  );

  document.getElementById("status").innerHTML = `
  <div class="tx-box">
    ${tx.hash} <button onclick="copyText('${tx.hash}')">Copy</button><br>
    ⏳ Pending...
  </div>`;

  await tx.wait();

  document.getElementById("status").innerHTML = `
  <div class="tx-box">
    ${tx.hash} <button onclick="copyText('${tx.hash}')">Copy</button><br>
    ✅ Confirmed
  </div>`;

  await loadBalance();

 }catch(e){
  document.getElementById("status").innerText = e.message;
 }
}

async function switchArc(){
 try{
  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:ARC_CHAIN}]
  });
 }catch{
  await window.ethereum.request({
   method:"wallet_addEthereumChain",
   params:[{
    chainId:ARC_CHAIN,
    chainName:"Arc Testnet",
    rpcUrls:[ARC_RPC],
    nativeCurrency:{name:"USDC",symbol:"USDC",decimals:6}
   }]
  });
 }
}

// ✅ SCANNER FULL
async function scan(){
 try{
  const q = document.getElementById("search").value.trim();
  const out = document.getElementById("result");
  const rpc = new ethers.providers.JsonRpcProvider(ARC_RPC);

  if(q.length===66){
    const tx = await rpc.getTransaction(q);
    const receipt = await rpc.getTransactionReceipt(q);

    out.innerHTML=`
    <div class="tx-box">
      Hash: ${q} <button onclick="copyText('${q}')">Copy</button><br>
      From: ${tx.from} <button onclick="copyText('${tx.from}')">Copy</button><br>
      To: ${tx.to} <button onclick="copyText('${tx.to}')">Copy</button><br>
      Status: ${receipt.status===1?"Success":"Pending"}
    </div>`;
  }
 }catch(e){
  document.getElementById("result").innerText="Error";
 }
}

// ✅ WALLET SEARCH
async function checkWallet(){
 try{
  const addr = document.getElementById("walletSearch").value.trim();
  const out = document.getElementById("walletResult");

  const rpc = new ethers.providers.JsonRpcProvider(ARC_RPC);

  const contract = new ethers.Contract(USDC,[
    "function balanceOf(address) view returns(uint256)"
  ],rpc);

  const bal = await contract.balanceOf(addr);

  out.innerHTML=`
  <div class="tx-box">
    ${addr} <button onclick="copyText('${addr}')">Copy</button><br>
    Balance: ${ethers.utils.formatUnits(bal,DECIMALS)} USDC
  </div>`;
 }catch{
  document.getElementById("walletResult").innerText="Error";
 }
}
</script>

</body>
  </html>
