<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <!-- WalletConnect v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.10.0/dist/index.umd.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 90%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
    }

    #txs p {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>ArcFlow</h1>
  <p>Universal Value Router (Arc Testnet)</p>

  <button onclick="connectWallet()">Connect Wallet</button>

  <p id="balance">Balance: --</p>

  <input id="address" placeholder="Recipient address" />
  <input id="amount" placeholder="Amount (USDC)" />

  <button onclick="send()">Send Smart</button>

  <p id="status"></p>

  <h3>Recent Transactions</h3>
  <div id="txs"></div>

<script>

// ================= ARC CONFIG =================
const ARC_CHAIN_ID = 5042002;
const ARC_RPC = "https://rpc.testnet.arc.network";
// ==============================================

let provider;
let signer;
let userAddress = "";


// 🔹 CONNECT UNIVERSAL (ALL WALLETS)
async function connectWallet() {

  // Injected wallets (MetaMask, Rabby, OKX, Bitget)
  if (window.ethereum) {
    try {
      provider = new ethers.providers.Web3Provider(window.ethereum);

      await provider.send("eth_requestAccounts", []);

      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x" + ARC_CHAIN_ID.toString(16) }]
      });

      signer = provider.getSigner();
      userAddress = await signer.getAddress();

      document.getElementById("status").innerText =
        "Connected: " + userAddress;

      loadBalance();
      return;

    } catch (err) {
      console.log("Injected failed, fallback...");
    }
  }

  // WalletConnect fallback
  try {
    const wcProvider = await EthereumProvider.init({
      projectId: "demo",
      chains: [ARC_CHAIN_ID],
      rpcMap: {
        [ARC_CHAIN_ID]: ARC_RPC
      },
      showQrModal: true
    });

    await wcProvider.enable();

    provider = new ethers.providers.Web3Provider(wcProvider);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("status").innerText =
      "Connected (WalletConnect): " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText =
      "Connection failed";
  }
}


// 🔹 LOAD BALANCE (ARC NATIVE USDC)
async function loadBalance() {
  try {
    const balance = await provider.getBalance(userAddress);
    const formatted = ethers.utils.formatUnits(balance, 18);

    document.getElementById("balance").innerText =
      "Balance: " + parseFloat(formatted).toFixed(4) + " USDC";

  } catch (err) {
    console.log(err);
  }
}


// 🔹 ROUTING LOGIC
function smartRoute(amount) {
  return amount < 50 ? "direct" : "bridge";
}


// 🔹 SEND TRANSACTION (ARC NATIVE USDC)
async function send() {

  const to = document.getElementById("address").value;
  const amount = document.getElementById("amount").value;

  if (!to || !amount) {
    alert("Enter address & amount");
    return;
  }

  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  const route = smartRoute(amount);

  if (route === "direct") {

    try {
      document.getElementById("status").innerText =
        "Sending...";

      const tx = await signer.sendTransaction({
        to: to,
        value: ethers.utils.parseUnits(amount, 18)
      });

      document.getElementById("status").innerText =
        "Tx Sent: " + tx.hash;

      addTx(tx.hash, amount, to);

      setTimeout(loadBalance, 3000);

    } catch (err) {
      document.getElementById("status").innerText =
        "Error: " + err.message;
    }

  } else {
    document.getElementById("status").innerText =
      "Bridge route (CCTP coming next)";
  }
}


// 🔹 LOCAL TX HISTORY
function addTx(hash, amount, to) {
  const el = document.getElementById("txs");

  const item = document.createElement("p");
  item.innerText =
    "Sent " + amount + " → " + to.slice(0,6) + "... | " + hash.slice(0,10);

  el.prepend(item);
}

</script>

</body>
                               </html>
