<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcFlow Pro</title>

<!-- ✅ CORRECT FARCASTER FRAME (THIS FIXES BUTTON) -->
<meta property="fc:frame" content="vNext" />
<meta property="fc:frame:image" content="https://arcflow-router.vercel.app/frame.png?v=30" />
<meta property="fc:frame:button:1" content="Open ArcFlow" />
<meta property="fc:frame:button:1:action" content="link" />
<meta property="fc:frame:button:1:target" content="https://arcflow-router.vercel.app" />

<!-- ✅ OPEN GRAPH -->
<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=30" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#11182b;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;margin:5px;background:#3b5cff;color:#fff;border:none;border-radius:6px}
input{width:100%;padding:10px;margin:5px 0;background:#0c1426;color:#fff;border:1px solid #1b2440;border-radius:6px}
</style>
</head>

<body>

<h2>ArcFlow Pro</h2>
<p style="opacity:0.6;">Arc ecosystem + wallet router in one place</p>

<!-- ✅ ENV DETECTION -->
<p id="env" style="color:#f39c12;font-size:12px;"></p>

<div class="card">
<button onclick="connect()">Connect Wallet</button>
<button onclick="switchArc()">Switch Arc</button>
<p id="addr">—</p>
<p id="bal">—</p>
<p id="status">Idle</p>
</div>

<script>
const ARC_CHAIN = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

/* ✅ DETECT FARCASTER */
const isFarcaster = navigator.userAgent.toLowerCase().includes("farcaster");

/* ✅ SHOW ENV MESSAGE */
document.getElementById("env").innerText = isFarcaster
 ? "⚠️ Open in browser for wallet features"
 : "✅ Full features available";

/* ✅ SAFE NAVIGATION */
function go(url){
 window.location.href = url;
}

/* ✅ CONNECT */
async function connect(){
 try{
  if(!window.ethereum){
    document.getElementById("status").innerText =
      isFarcaster
      ? "Wallet not supported inside Farcaster"
      : "Install MetaMask";
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);

  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("addr").innerText = user;
  document.getElementById("status").innerText = "Connected";

  loadBalance();

 }catch(e){
  document.getElementById("status").innerText = e.message;
 }
}

/* ✅ SWITCH NETWORK */
async function switchArc(){
 if(!window.ethereum){
  document.getElementById("status").innerText = "Wallet not available";
  return;
 }

 try{
  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:ARC_CHAIN}]
  });
 }catch{
  await window.ethereum.request({
   method:"wallet_addEthereumChain",
   params:[{
    chainId:ARC_CHAIN,
    chainName:"Arc Testnet",
    rpcUrls:[ARC_RPC],
    nativeCurrency:{name:"USDC",symbol:"USDC",decimals:6}
   }]
  });
 }
}

/* ✅ BALANCE */
async function loadBalance(){
 if(!provider || !user) return;

 try{
  const contract = new ethers.Contract(USDC,[
    "function balanceOf(address) view returns(uint256)"
  ],provider);

  const bal = await contract.balanceOf(user);

  document.getElementById("bal").innerText =
    ethers.utils.formatUnits(bal, DECIMALS)+" USDC";

 }catch{
  document.getElementById("bal").innerText="Error";
 }
}
</script>

</body>
  </html>
