<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- Ethers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- WalletConnect v1 -->
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-top: 40px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<h1>ArcFlow</h1>
<p>Universal Wallet (Arc Testnet)</p>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="balance">Balance: --</p>

<input id="address" placeholder="Recipient address" />
<input id="amount" placeholder="Amount (USDC)" />

<button onclick="send()">Send Smart</button>

<p id="status"></p>

<script>

// ================= CONFIG =================
const ARC_CHAIN_ID = 5042002;
const ARC_CHAIN_ID_HEX = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
// ==========================================

const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)",
  "function balanceOf(address owner) view returns (uint256)"
];

let provider;
let signer;
let userAddress;

// Detect mobile
const isMobile = /android|iphone|ipad/i.test(navigator.userAgent);

// ================= CONNECT =================
async function connectWallet() {
  try {

    // 🔥 1. Injected wallets (Brave, MetaMask, Rabby)
    if (window.ethereum) {
      provider = new ethers.providers.Web3Provider(window.ethereum, "any");
      await provider.send("eth_requestAccounts", []);
    }

    // 🔥 2. WalletConnect fallback (OKX, Bitget, Trust etc.)
    else {
      const wc = new WalletConnectProvider.default({
        rpc: {
          5042002: ARC_RPC
        }
      });

      await wc.enable();

      // 🔥 Mobile deep link fix
      if (isMobile && wc.connector.uri) {
        window.location.href = wc.connector.uri;
      }

      provider = new ethers.providers.Web3Provider(wc, "any");
    }

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    await ensureArcNetwork();

    document.getElementById("status").innerText =
      "Connected: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText =
      "Error: " + err.message;
  }
}

// ================= NETWORK =================
async function ensureArcNetwork() {
  try {
    const network = await provider.getNetwork();

    if (network.chainId !== ARC_CHAIN_ID) {
      await provider.send("wallet_switchEthereumChain", [
        { chainId: ARC_CHAIN_ID_HEX }
      ]);
    }

  } catch {
    await provider.send("wallet_addEthereumChain", [{
      chainId: ARC_CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      rpcUrls: [ARC_RPC],
      nativeCurrency: {
        name: "USDC",
        symbol: "USDC",
        decimals: 18
      },
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    }]);
  }
}

// ================= BALANCE =================
async function loadBalance() {
  const usdc = new ethers.Contract(
    USDC_ADDRESS,
    ERC20_ABI,
    provider
  );

  const bal = await usdc.balanceOf(userAddress);
  const dec = await usdc.decimals();

  document.getElementById("balance").innerText =
    "Balance: " + ethers.utils.formatUnits(bal, dec) + " USDC";
}

// ================= ROUTE =================
function smartRoute(amount) {
  return amount < 50 ? "direct" : "bridge";
}

// ================= SEND =================
async function send() {
  try {
    const to = document.getElementById("address").value;
    const amount = document.getElementById("amount").value;

    if (!to || !amount) {
      alert("Enter address & amount");
      return;
    }

    const route = smartRoute(parseFloat(amount));

    if (route === "direct") {

      const usdc = new ethers.Contract(
        USDC_ADDRESS,
        ERC20_ABI,
        signer
      );

      const dec = await usdc.decimals();
      const amt = ethers.utils.parseUnits(amount, dec);

      const tx = await usdc.transfer(to, amt);

      document.getElementById("status").innerText =
        "Tx Sent: " + tx.hash;

    } else {
      document.getElementById("status").innerText =
        "Bridge route (coming soon)";
    }

  } catch (err) {
    document.getElementById("status").innerText =
      "Error: " + err.message;
  }
}

</script>

</body>
</html>
