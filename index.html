<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcFlow Pro</title>

<meta property="fc:frame" content='{"version":"next","imageUrl":"https://arcflow-router.vercel.app/frame.png?v=13","button":{"title":"Open ArcFlow","action":{"type":"launch_frame","name":"ArcFlow Pro","url":"https://arcflow-router.vercel.app"}}}' />

<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=13" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#11182b;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px 12px;margin:5px;background:#3b5cff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
input{width:100%;padding:10px;margin:5px 0;background:#0c1426;color:#fff;border:1px solid #1b2440;border-radius:6px}

.logo-top-right{
  position: fixed;
  top: 15px;
  right: 15px;
  width: 42px;
  height: 42px;
}

.tx-box{
  margin-top:10px;
  padding:10px;
  background:#0c1426;
  border-radius:8px;
  font-size:12px;
  word-break: break-all;
}
</style>
</head>

<body>

<script type="module">
import sdk from "https://esm.sh/@farcaster/frame-sdk";
sdk.actions.ready();
</script>

<h2>ArcFlow Pro</h2>

<div class="card">
<button onclick="connect()">Connect</button>
<button onclick="switchArc()">Switch Arc</button>
<button onclick="switchWallet()">Switch Wallet</button>

<p id="addr">—</p>
<p id="bal">—</p>
<div id="status">Idle</div>
</div>

<div class="card">
<h3>Send USDC</h3>
<input id="to"/>
<input id="amount"/>
<button onclick="send()">Send</button>
</div>

<div class="card">
<h3>Arc Scanner</h3>
<input id="search"/>
<button onclick="scan()">Search</button>
<div id="result"></div>
</div>

<script>
const ARC_CHAIN = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

function shortHash(h){return h.slice(0,6)+"..."+h.slice(-4)}
function copyText(t){navigator.clipboard.writeText(t)}
function go(u){window.open(u,"_blank")}

// CONNECT
async function connect(){
 provider = new ethers.providers.Web3Provider(window.ethereum);
 await provider.send("eth_requestAccounts",[]);
 signer = provider.getSigner();
 user = await signer.getAddress();

 document.getElementById("addr").innerText = shortHash(user);
 await loadBalance();
}

// SWITCH WALLET
async function switchWallet(){
 const acc = await window.ethereum.request({method:"eth_requestAccounts"});
 user = acc[0];
 signer = provider.getSigner();
 document.getElementById("addr").innerText = shortHash(user);
 await loadBalance();
}

// AUTO CHANGE
if(window.ethereum){
 window.ethereum.on("accountsChanged", async (acc)=>{
  user = acc[0];
  signer = provider.getSigner();
  document.getElementById("addr").innerText = shortHash(user);
  await loadBalance();
 });
}

// BALANCE
async function loadBalance(){
 const contract = new ethers.Contract(USDC,[
  "function balanceOf(address) view returns(uint256)"
 ],provider);

 const bal = await contract.balanceOf(user);
 document.getElementById("bal").innerText =
  ethers.utils.formatUnits(bal, DECIMALS)+" USDC";
}

// SEND
async function send(){
 try{
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value.trim();

  const contract = new ethers.Contract(USDC,[
    "function transfer(address,uint256) returns(bool)"
  ],signer);

  const tx = await contract.transfer(
    to,
    ethers.utils.parseUnits(amount, DECIMALS)
  );

  document.getElementById("status").innerHTML = `
    <div class="tx-box">
      ${shortHash(tx.hash)}<br>
      <button onclick="copyText('${tx.hash}')">Copy</button>
    </div>
  `;

  await tx.wait();
  await loadBalance();

 }catch(e){
  document.getElementById("status").innerText = e.message;
 }
}

// SWITCH NETWORK
async function switchArc(){
 try{
  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:ARC_CHAIN}]
  });
 }catch{
  await window.ethereum.request({
   method:"wallet_addEthereumChain",
   params:[{
    chainId:ARC_CHAIN,
    chainName:"Arc Testnet",
    rpcUrls:[ARC_RPC],
    nativeCurrency:{name:"USDC",symbol:"USDC",decimals:6}
   }]
  });
 }
}

// SCANNER (FINAL FIXED)
async function scan(){
 try{
  const q = document.getElementById("search").value.trim();
  const out = document.getElementById("result");

  if(!q){
    out.innerHTML = "Enter input";
    return;
  }

  out.innerHTML = "Loading...";

  const rpc = new ethers.providers.JsonRpcProvider(ARC_RPC);

  // TX
  if(q.length === 66){
    const tx = await rpc.getTransaction(q);
    const receipt = await rpc.getTransactionReceipt(q);

    out.innerHTML = `
    <div class="tx-box">
      ${shortHash(q)}<br>
      <button onclick="copyText('${q}')">Copy</button><br><br>
      Status: ${receipt && receipt.status === 1 ? "Success" : "Pending"}
    </div>`;
    return;
  }

  // WALLET
  if(q.length === 42){
    const contract = new ethers.Contract(USDC,[
      "function balanceOf(address) view returns(uint256)"
    ],rpc);

    const bal = await contract.balanceOf(q);

    out.innerHTML = `
    <div class="tx-box">
      ${shortHash(q)}<br><br>
      Balance: ${ethers.utils.formatUnits(bal, DECIMALS)} USDC
    </div>`;
    return;
  }

  out.innerHTML = "Invalid input";

 }catch(e){
  document.getElementById("result").innerText = "Error";
 }
}
</script>

</body>
</html>
