<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- ✅ FIXED ETHERS (working CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- WalletConnect -->
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
      max-width: 300px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    h1 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>ArcFlow</h1>
<p>Arc Testnet Value Router</p>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="connectWalletConnect()">WalletConnect</button>

<p id="balance">Balance: --</p>

<input id="address" placeholder="Recipient address" />
<input id="amount" placeholder="Amount (USDC)" />

<button onclick="send()">Send Smart</button>

<p id="status"></p>

<script>

// ================= CONFIG =================

const ARC_CHAIN_ID = "0x4CE3CA"; // 5042002 in hex
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";

// ==========================================

// ERC20 ABI
const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)",
  "function balanceOf(address owner) view returns (uint256)"
];

let provider;
let signer;
let userAddress = "";

// 🔹 CONNECT (MetaMask, Brave, Rabby, OKX, Bitget)
async function connectWallet() {
  if (!window.ethereum) {
    alert("No wallet found");
    return;
  }

  try {
    provider = new ethers.providers.Web3Provider(window.ethereum);

    // Request accounts
    await provider.send("eth_requestAccounts", []);

    // Switch to Arc network
    await switchToArc();

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("status").innerText =
      "Connected: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText =
      "Error: " + err.message;
  }
}

// 🔹 WALLET CONNECT
async function connectWalletConnect() {
  try {
    const wcProvider = new WalletConnectProvider.default({
      rpc: {
        5042002: ARC_RPC
      }
    });

    await wcProvider.enable();

    provider = new ethers.providers.Web3Provider(wcProvider);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("status").innerText =
      "WalletConnect: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText =
      "WC Error: " + err.message;
  }
}

// 🔹 SWITCH NETWORK
async function switchToArc() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: ARC_CHAIN_ID }]
    });
  } catch (switchError) {

    // Add network if not exists
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: ARC_CHAIN_ID,
        chainName: "Arc Testnet",
        rpcUrls: [ARC_RPC],
        nativeCurrency: {
          name: "USDC",
          symbol: "USDC",
          decimals: 18
        },
        blockExplorerUrls: ["https://testnet.arcscan.app"]
      }]
    });
  }
}

// 🔹 LOAD BALANCE
async function loadBalance() {
  try {
    const usdc = new ethers.Contract(
      USDC_ADDRESS,
      ERC20_ABI,
      provider
    );

    const balance = await usdc.balanceOf(userAddress);
    const decimals = await usdc.decimals();

    const formatted = ethers.utils.formatUnits(balance, decimals);

    document.getElementById("balance").innerText =
      "Balance: " + formatted + " USDC";

  } catch (err) {
    console.log(err);
  }
}

// 🔹 ROUTING LOGIC
function smartRoute(amount) {
  return amount < 50 ? "direct" : "bridge";
}

// 🔹 SEND
async function send() {
  const to = document.getElementById("address").value;
  const amount = document.getElementById("amount").value;

  if (!to || !amount) {
    alert("Enter address & amount");
    return;
  }

  const route = smartRoute(parseFloat(amount));

  if (route === "direct") {
    try {
      const usdc = new ethers.Contract(
        USDC_ADDRESS,
        ERC20_ABI,
        signer
      );

      const decimals = await usdc.decimals();
      const parsedAmount = ethers.utils.parseUnits(amount, decimals);

      const tx = await usdc.transfer(to, parsedAmount);

      document.getElementById("status").innerText =
        "Tx Sent: " + tx.hash;

    } catch (err) {
      document.getElementById("status").innerText =
        "Error: " + err.message;
    }

  } else {
    document.getElementById("status").innerText =
      "Bridge route (next upgrade)";
  }
}

</script>

</body>
  </html>
