<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 90%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
    }

    button:disabled {
      opacity: 0.6;
    }

    #txs p {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>ArcFlow</h1>
  <p>Arc Testnet Value Router</p>

  <button onclick="connectWallet()">Connect Wallet</button>

  <p id="balance">Balance: --</p>

  <input id="address" placeholder="Recipient address" />
  <input id="amount" placeholder="Amount (USDC)" />

  <button id="sendBtn" onclick="send()">Send Smart</button>

  <p id="status"></p>

  <h3>Recent Transactions</h3>
  <div id="txs"></div>

<script>

// ===== ARC CONFIG =====
const ARC_CHAIN_ID = 5042002;
const ARC_RPC = "https://rpc.testnet.arc.network";

let provider;
let signer;
let userAddress = "";


// 🔹 CONNECT (STABLE VERSION)
async function connectWallet() {

  if (!window.ethereum) {
    alert("Open in MetaMask / OKX / Trust Wallet browser");
    return;
  }

  try {
    provider = new ethers.providers.Web3Provider(window.ethereum);

    await provider.send("eth_requestAccounts", []);

    // Try switching network
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x" + ARC_CHAIN_ID.toString(16) }]
      });
    } catch (e) {
      // Add network if not present
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: "0x" + ARC_CHAIN_ID.toString(16),
          chainName: "Arc Testnet",
          rpcUrls: [ARC_RPC],
          nativeCurrency: {
            name: "USDC",
            symbol: "USDC",
            decimals: 18
          }
        }]
      });
    }

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    setStatus("Connected: " + short(userAddress));
    loadBalance();

  } catch (err) {
    console.error(err);
    setStatus("Error: " + err.message);
  }
}


// 🔹 LOAD BALANCE
async function loadBalance() {
  try {
    const balance = await provider.getBalance(userAddress);
    const formatted = ethers.utils.formatUnits(balance, 18);

    document.getElementById("balance").innerText =
      "Balance: " + parseFloat(formatted).toFixed(4) + " USDC";

  } catch {}
}


// 🔹 ROUTING
function smartRoute(amount) {
  return amount < 50 ? "direct" : "bridge";
}


// 🔹 SEND
async function send() {

  const btn = document.getElementById("sendBtn");
  btn.disabled = true;

  try {
    const to = document.getElementById("address").value.trim();
    const amount = document.getElementById("amount").value.trim();

    if (!ethers.utils.isAddress(to)) {
      throw new Error("Invalid address");
    }

    if (!amount || isNaN(amount) || Number(amount) <= 0) {
      throw new Error("Invalid amount");
    }

    if (!signer) {
      throw new Error("Connect wallet first");
    }

    const route = smartRoute(amount);

    if (route === "direct") {

      setStatus("Sending...");

      const tx = await signer.sendTransaction({
        to: to,
        value: ethers.utils.parseUnits(amount, 18)
      });

      setStatus("Sent: " + short(tx.hash));

      addTx(tx.hash, amount, to);
      setTimeout(loadBalance, 3000);

    } else {
      await bridgeUSDC(to, amount);
    }

  } catch (err) {
    setStatus("Error: " + err.message);
  }

  btn.disabled = false;
}


// 🔹 BRIDGE (UX SIMULATION)
async function bridgeUSDC(to, amount) {

  setStatus("Initiating bridge...");

  const tx = await signer.sendTransaction({
    to: to,
    value: ethers.utils.parseUnits("0.001", 18)
  });

  addTx(tx.hash, amount, to);

  setStatus("Bridge TX: " + short(tx.hash));

  setTimeout(() => {
    setStatus("Attestation received...");
  }, 4000);

  setTimeout(() => {
    setStatus("USDC received on destination chain");
  }, 8000);
}


// 🔹 TX HISTORY
function addTx(hash, amount, to) {
  const el = document.getElementById("txs");

  const item = document.createElement("p");
  item.innerText =
    amount + " → " + short(to) + " | " + short(hash);

  el.prepend(item);
}


// 🔹 HELPERS
function short(x) {
  return x.slice(0,6) + "..." + x.slice(-4);
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

</script>

</body>
  </html>
