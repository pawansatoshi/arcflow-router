<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcFlow Pro</title>

<!-- ✅ KEEP YOUR FRAME -->
<meta property="fc:frame" content='{"version":"next","imageUrl":"https://arcflow-router.vercel.app/frame.png?v=13","button":{"title":"Open ArcFlow","action":{"type":"launch_frame","name":"ArcFlow Pro","url":"https://arcflow-router.vercel.app"}}}' />

<!-- OPEN GRAPH -->
<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=13" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#11182b;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;margin:5px;background:#3b5cff;color:#fff;border:none;border-radius:6px}
input{width:100%;padding:10px;margin:5px 0;background:#0c1426;color:#fff;border:1px solid #1b2440;border-radius:6px}

/* WARNING BAR */
.warning{
  background:#ff9800;
  color:#000;
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
  font-size:13px;
}
</style>
</head>

<body>

<div id="warn"></div>

<h2>ArcFlow Pro</h2>
<p style="opacity:0.6;">Arc ecosystem + wallet router in one place</p>

<div class="card">
<button onclick="connect()">Connect</button>
<button onclick="switchArc()">Switch Arc</button>
<p id="addr">—</p>
<p id="bal">—</p>
<p id="status">Idle</p>
</div>

<script>
const ARC_CHAIN = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

/* ✅ DETECT FARCASTER */
const isFarcaster = navigator.userAgent.toLowerCase().includes("farcaster");

/* ✅ SHOW WARNING */
if(isFarcaster){
 document.getElementById("warn").innerHTML = `
  <div class="warning">
   ⚠️ Running inside Farcaster (Test Mode)<br>
   Wallet features may not work.<br>
   Open in browser for full functionality.
  </div>
 `;
}

/* ✅ SAFE CONNECT */
async function connect(){
 try{

  if(!window.ethereum){
    document.getElementById("status").innerText =
      isFarcaster
      ? "Wallet not available inside Farcaster"
      : "Install MetaMask";
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);

  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("addr").innerText = user;
  document.getElementById("status").innerText="Connected";

  loadBalance();

 }catch(e){
  document.getElementById("status").innerText=e.message;
 }
}

/* ✅ SAFE SWITCH */
async function switchArc(){

 if(!window.ethereum){
  document.getElementById("status").innerText="Wallet not available";
  return;
 }

 try{
  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:ARC_CHAIN}]
  });
 }catch{
  await window.ethereum.request({
   method:"wallet_addEthereumChain",
   params:[{
    chainId:ARC_CHAIN,
    chainName:"Arc Testnet",
    rpcUrls:[ARC_RPC],
    nativeCurrency:{name:"USDC",symbol:"USDC",decimals:6}
   }]
  });
 }
}

/* ✅ BALANCE SAFE */
async function loadBalance(){
 if(!provider || !user) return;

 try{
  const contract = new ethers.Contract(USDC,[
    "function balanceOf(address) view returns(uint256)"
  ],provider);

  const bal = await contract.balanceOf(user);

  document.getElementById("bal").innerText =
    ethers.utils.formatUnits(bal, DECIMALS)+" USDC";

 }catch{
  document.getElementById("bal").innerText="Balance error";
 }
}
</script>

</body>
 </html>
