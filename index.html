<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ArcFlow Pro</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<meta property="fc:frame" content='{"version":"next","imageUrl":"https://arcflow-router.vercel.app/frame.png?v=15","button":{"title":"Open ArcFlow","action":{"type":"launch_frame","name":"ArcFlow Pro","url":"https://arcflow-router.vercel.app"}}}' />

<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=15" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js?v=2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<script type="module">
  import sdk from "https://esm.sh/@farcaster/frame-sdk";
  sdk.actions.ready();
</script>

<style>
  body {
    background: #050812;
    background-image: radial-gradient(circle at 50% 0%, #15224a 0%, #050812 70%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .app-container {
    max-width: 480px;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    padding-bottom: 60px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }

  .header h2 {
    margin: 0;
    font-size: 24px;
    background: linear-gradient(90deg, #ffffff, #8a9cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-top-right {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    padding: 5px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .card {
    background: rgba(17, 24, 43, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 16px;
    margin-bottom: 18px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .card h3 {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8a9cff;
  }

  button {
    padding: 10px 14px;
    margin: 4px 2px;
    background: #2540d9;
    color: #fff;
    border: 1px solid #3b5cff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: 0.2s;
  }
  button:hover { background: #3b5cff; transform: translateY(-1px); }
  button:active { transform: translateY(1px); }
  button:disabled { background: #555; border-color: #444; cursor: not-allowed; }
  
  .btn-quick { background: rgba(59, 92, 255, 0.2); border-color: transparent; color: #8a9cff; padding: 6px 12px; }

  /* Modified to include textarea styling perfectly */
  input, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0 12px 0;
    background: rgba(0,0,0,0.3);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  input:focus, textarea:focus { border-color: #3b5cff; }
  textarea { resize: vertical; min-height: 80px; }

  .arc-container { display:flex; overflow-x:auto; gap:10px; padding-bottom:8px; }
  .arc-container::-webkit-scrollbar { display:none; }
  .arc { 
    padding: 8px 16px; 
    background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; 
    cursor: pointer; 
    font-size: 12px; 
    white-space: nowrap;
    transition: 0.2s;
  }
  .arc:hover { background: rgba(255,255,255,0.1); }

  .icon { font-size: 20px; margin: 0 12px; cursor: pointer; color: #8a9cff; transition: 0.2s;}
  .icon:hover { color: #fff; }

  .tx-box { margin-top:10px; padding:12px; background: rgba(0,0,0,0.3); border-radius:10px; font-size:12px; word-break: break-all; border: 1px solid rgba(255,255,255,0.05);}
  .warning-box { background: rgba(255, 152, 0, 0.1); border-left: 4px solid #ff9800; padding: 12px; margin-top: 10px; border-radius: 4px; font-size: 13px; }

  .wallet-info { display: flex; justify-content: space-between; margin-top: 15px; font-size: 14px; }
  .net-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff4444; margin-right: 6px; }
  .net-dot.active { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
</style>
</head>

<body>

<div class="app-container">

  <div class="header">
    <div>
      <h2>ArcFlow Pro</h2>
      <div style="font-size: 12px; color: #888; margin-top: 4px;">Universal Routing Hub</div>
    </div>
    <a href="https://arc.network" target="_blank">
      <img src="./logo.png" class="logo-top-right"/>
    </a>
  </div>

  <div class="card">
    <h3><i class="fas fa-wallet" style="margin-right:8px;"></i> Connection</h3>
    <button onclick="connect()">Connect</button>
    <button onclick="switchArc()">Switch Arc</button>
    <button onclick="switchWallet()">Switch Wallet</button>

    <div class="wallet-info">
      <span><span id="netIndicator" class="net-dot"></span><span id="addr">—</span></span>
      <span id="bal" style="font-weight:bold; color:#00ff88;">—</span>
    </div>
    <div id="status" style="margin-top:10px; font-size:12px; color:#aaa;">Idle</div>
  </div>

  <div class="card">
    <h3><i class="fas fa-paper-plane" style="margin-right:8px;"></i> Send USDC</h3>
    <input id="to" placeholder="Recipient address (0x...)"/>
    
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:12px; color:#888;">Quick Amount:</span>
      <div>
        <button class="btn-quick" onclick="setAmt('10')">10</button>
        <button class="btn-quick" onclick="setAmt('50')">50</button>
        <button class="btn-quick" onclick="setAmt('100')">100</button>
      </div>
    </div>
    <input id="amount" type="number" placeholder="Amount (USDC)"/>
    <button onclick="send()" style="width:100%;">Confirm Send</button>
  </div>

  <div class="card">
    <h3><i class="fas fa-search" style="margin-right:8px;"></i> Arc Scanner</h3>
    <input id="search" placeholder="Paste Tx Hash to verify"/>
    <button onclick="scan()">Scan Transaction</button>
    <div id="result"></div>
  </div>

  <div class="card">
    <h3><i class="fas fa-globe" style="margin-right:8px;"></i> Ecosystem Links</h3>
    <div class="arc-container">
      <div class="arc" onclick="go('https://faucet.circle.com')">USDC Faucet</div>
      <div class="arc" onclick="go('https://arc.network')">Arc Hub</div>
      <div class="arc" onclick="go('https://discord.gg/buildonarc')">Discord</div>
      <div class="arc" onclick="go('https://community.arc.network/home')">House</div>
    </div>
  </div>

  <div class="card">
    <h3><i class="fas fa-comment-dots" style="margin-right:8px;"></i> Feedback & Support</h3>
    <input id="fb-name" placeholder="Your Name or Farcaster ID (Optional)"/>
    <textarea id="fb-msg" placeholder="Report an issue or suggest a feature..."></textarea>
    <button id="fb-btn" onclick="sendFeedback()" style="width:100%;">Send Feedback</button>
    <div id="fb-status" style="margin-top:10px; font-size:13px; text-align:center; display:none;"></div>
  </div>

  <div class="card" style="text-align: center;">
    <i class="fab fa-x-twitter icon" onclick="go('https://x.com/pawansatoshix')"></i>
    <i class="fab fa-github icon" onclick="go('https://github.com/pawansatoshi')"></i>
    <i class="fab fa-youtube icon" onclick="go('https://youtube.com/@PawanSatoshi')"></i>
    <i class="fab fa-telegram icon" onclick="go('https://t.me/pawansatoshi')"></i>
  </div>

</div>

<script>
const ARC_CHAIN_HEX = "0x4ceb92";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

if (window.ethereum) {
  window.ethereum.on("chainChanged", () => location.reload());
  window.ethereum.on("accountsChanged", () => location.reload());
}

async function getChainId(){
 const rpc = new ethers.providers.JsonRpcProvider(ARC_RPC);
 const net = await rpc.getNetwork();
 return "0x" + net.chainId.toString(16);
}

function go(u){window.open(u,"_blank")}
function copyText(t){navigator.clipboard.writeText(t)}
function shortHash(h){return h.slice(0,6)+"..."+h.slice(-4)}
function setAmt(val){document.getElementById('amount').value = val;}

async function updateNetworkStatus() {
  if(!window.ethereum) return;
  try {
    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
    const expectedChain = await getChainId();
    if(chainId === expectedChain) {
      document.getElementById("netIndicator").classList.add("active");
    } else {
      document.getElementById("netIndicator").classList.remove("active");
    }
  } catch(e) {}
}

async function connect(){
  if(!window.ethereum) {
    document.getElementById("status").innerText = "No Web3 wallet detected.";
    return;
  }
  try {
    document.getElementById("status").innerText = "Connecting...";
    await window.ethereum.request({ method: "eth_requestAccounts" });
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    signer = provider.getSigner();
    user = await signer.getAddress();
    
    document.getElementById("addr").innerText = shortHash(user);
    document.getElementById("status").innerText = "Connected Securely";
    await loadBalance();
    await updateNetworkStatus();
  } catch (e) {
    document.getElementById("status").innerText = "Connection failed: " + e.message;
  }
}

async function switchWallet(){
  if(!window.ethereum){
    document.getElementById("status").innerText = "Wallet not available";
    return;
  }
  try {
    document.getElementById("status").innerText = "Requesting wallet change...";
    await window.ethereum.request({
      method: "wallet_requestPermissions",
      params: [{ eth_accounts: {} }]
    });
    await connect();
  } catch (e) {
    provider = null;
    signer = null;
    user = null;
    document.getElementById("addr").innerText = "—";
    document.getElementById("bal").innerText = "—";
    document.getElementById("netIndicator").classList.remove("active");
    
    document.getElementById("status").innerHTML = `
      <div class="warning-box">
        <b>⚠️ Auto-Popup Blocked</b><br><br>
        1. Open your browser's Wallet menu.<br>
        2. Change your active account.<br>
        3. Tap 'Connect' again.
      </div>
    `;
  }
}

async function loadBalance(){
  if(!user) return;
  try {
    const directRpc = new ethers.providers.JsonRpcProvider(ARC_RPC);
    const contract = new ethers.Contract(USDC, ["function balanceOf(address) view returns(uint256)"], directRpc);
    const bal = await contract.balanceOf(user);
    document.getElementById("bal").innerText = ethers.utils.formatUnits(bal, DECIMALS)+" USDC";
  } catch(e) {
    document.getElementById("bal").innerText = "0.00 USDC";
  }
}

async function send(){
  if(!signer) {
    document.getElementById("status").innerText = "Please connect wallet first.";
    return;
  }
  try{
   const to = document.getElementById("to").value.trim();
   const amount = document.getElementById("amount").value.trim();

   const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
   const expectedChain = await getChainId();
   if(currentChain !== expectedChain) {
     document.getElementById("status").innerHTML = `<div class="warning-box">⚠️ Please Switch to Arc Testnet first!</div>`;
     return;
   }

   const contract = new ethers.Contract(USDC, ["function transfer(address,uint256) returns(bool)"], signer);
   const tx = await contract.transfer(to, ethers.utils.parseUnits(amount, DECIMALS));

   document.getElementById("status").innerHTML = `
   <div class="tx-box">
     Tx: ${shortHash(tx.hash)} <button onclick="copyText('${tx.hash}')">Copy</button><br>
     ⏳ Processing on Arc...
   </div>`;

   await tx.wait();

   document.getElementById("status").innerHTML = `
   <div class="tx-box">
     Tx: ${shortHash(tx.hash)} <button onclick="copyText('${tx.hash}')">Copy</button><br>
     ✅ Settled Instantly
   </div>`;

   await loadBalance();

  }catch(e){
   document.getElementById("status").innerText = "Error: " + e.message;
  }
}

async function switchArc(){
  if(!window.ethereum) return;
  try {
   const dynamicChain = await getChainId();
   await window.ethereum.request({
    method: "wallet_switchEthereumChain",
    params: [{chainId: dynamicChain}]
   });
   document.getElementById("status").innerText = "Switched to Arc Testnet!";
   updateNetworkStatus();
  } catch(e) {
   if(e.code === 4902 || e.code === -32603 || (e.message && e.message.includes("add"))) {
     try {
       const dynamicChain = await getChainId();
       await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
         chainId: dynamicChain,
         chainName: "Arc Testnet",
         rpcUrls: [ARC_RPC],
         nativeCurrency: {name: "USDC", symbol: "USDC", decimals: 6},
         blockExplorerUrls: ["https://testnet.arcscan.app"]
        }]
       });
       document.getElementById("status").innerText = "Network Added & Switched!";
       updateNetworkStatus();
     } catch (addError) {
       document.getElementById("status").innerText = "Add network cancelled.";
     }
   } else {
     document.getElementById("status").innerText = "Switch failed: " + e.message;
   }
  }
}

async function scan(){
  try{
   const q = document.getElementById("search").value.trim();
   const out = document.getElementById("result");
   const rpc = new ethers.providers.JsonRpcProvider(ARC_RPC);

   if(q.startsWith("0x") && q.length === 66){
     const tx = await rpc.getTransaction(q);
     const receipt = await rpc.getTransactionReceipt(q);

     let realTo = tx.to;
     let amount = "";

     if(tx.to && tx.to.toLowerCase() === USDC.toLowerCase()){
       const iface = new ethers.utils.Interface(["function transfer(address,uint256)"]);
       const parsed = iface.parseTransaction({ data: tx.data });
       realTo = parsed.args[0];
       amount = ethers.utils.formatUnits(parsed.args[1], DECIMALS)+" USDC";
     }

     out.innerHTML = `
     <div class="tx-box">
       <b>Details</b><br>
       From: ${shortHash(tx.from)} <button class="btn-quick" onclick="copyText('${tx.from}')">Copy</button><br>
       To: ${shortHash(realTo)} <button class="btn-quick" onclick="copyText('${realTo}')">Copy</button><br>
       Status: <span style="color:${receipt.status===1?'#00ff88':'#ff4444'}">${receipt.status===1?"Success":"Failed"}</span><br>
       Amount: ${amount}
     </div>`;
   }
  }catch(e){
   document.getElementById("result").innerText="Error fetching tx details.";
  }
}

/* ✅ NEW FEEDBACK API FUNCTION */
async function sendFeedback() {
  const name = document.getElementById("fb-name").value.trim() || "Anonymous";
  const msg = document.getElementById("fb-msg").value.trim();
  const status = document.getElementById("fb-status");
  const btn = document.getElementById("fb-btn");

  if (!msg) {
    status.style.display = "block";
    status.style.color = "#ff4444";
    status.innerText = "⚠️ Please write a message first.";
    return;
  }

  btn.innerText = "Sending...";
  btn.disabled = true;
  status.style.display = "none";

  try {
    const response = await fetch("https://formsubmit.co/ajax/pawansatoshi@gmail.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        Sender: name,
        Message: msg,
        _subject: "New ArcFlow Pro Feedback!"
      })
    });

    if (response.ok) {
      status.style.display = "block";
      status.style.color = "#00ff88";
      status.innerText = "✅ Feedback sent successfully!";
      document.getElementById("fb-msg").value = "";
      document.getElementById("fb-name").value = "";
    } else {
      throw new Error("Failed");
    }
  } catch (e) {
    status.style.display = "block";
    status.style.color = "#ff4444";
    status.innerText = "❌ Error sending. Try again later.";
  }

  btn.innerText = "Send Feedback";
  btn.disabled = false;
}
</script>

</body>
  </html>
