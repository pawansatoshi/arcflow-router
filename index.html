<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcFlow Pro</title>

<!-- ✅ FARCASTER FRAME (STABLE v1) -->
<meta property="fc:frame" content="vNext" />

<meta property="fc:frame:button:1:target" content="https://arcflow-router.vercel.app" />

<!-- ✅ OPEN GRAPH -->
<meta property="og:title" content="ArcFlow Pro" />
<meta property="og:description" content="Arc ecosystem + wallet router in one place" />
<meta property="og:image" content="https://arcflow-router.vercel.app/frame.png?v=21" />
<meta property="og:url" content="https://arcflow-router.vercel.app/" />
<meta property="og:type" content="website" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#11182b;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;margin:5px;background:#3b5cff;color:#fff;border:none;border-radius:6px;cursor:pointer}
input{width:100%;padding:10px;margin:5px 0;background:#0c1426;color:#fff;border:1px solid #1b2440;border-radius:6px}

.logo-top-right{
  position: fixed;
  top: 15px;
  right: 15px;
  width: 42px;
  height: 42px;
  object-fit: contain;
  z-index: 999;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  padding: 6px;
}

.arc-container{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding-bottom:5px;
}
.arc-container::-webkit-scrollbar{display:none;}

.arc{
  flex:0 0 auto;
  padding:10px 14px;
  background:#3b5cff;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  white-space:nowrap;
}

.icon{font-size:22px;margin:10px;cursor:pointer}
</style>
</head>

<body>

<a href="https://arc.network" target="_blank">
  <img src="./logo.png" class="logo-top-right"/>
</a>

<h2>ArcFlow Pro</h2>
<p style="opacity:0.6;">Arc ecosystem + wallet router in one place</p>

<!-- ✅ Wallet notice (Farcaster safe) -->
<p style="color:#f39c12;font-size:12px;">
Note: Wallet features may not work inside Farcaster. Open in browser for full access.
</p>

<div class="card">
<h3>Arc Ecosystem</h3>
<div class="arc-container">
  <div class="arc" onclick="go('https://faucet.circle.com')">Faucet</div>
  <div class="arc" onclick="go('https://discord.gg/buildonarc')">Discord</div>
  <div class="arc" onclick="go('https://arc.network')">Arc Hub</div>
  <div class="arc" onclick="go('https://community.arc.network/home')">House</div>
  <div class="arc" onclick="go('https://x.com/arc')">Arc X</div>
  <div class="arc" onclick="go('https://x.com/circle')">Circle X</div>
</div>
</div>

<div class="card">
<button onclick="connect()">Connect</button>
<button onclick="switchArc()">Switch Arc</button>
<p id="addr">—</p>
<p id="bal">—</p>
<p id="status">Idle</p>
</div>

<div class="card">
<h3>Send USDC</h3>
<input id="to" placeholder="Recipient address"/>
<input id="amount" placeholder="Amount (USDC)"/>
<button onclick="send()">Send</button>
</div>

<div class="card">
<h3>Arc Scanner</h3>
<input id="search" placeholder="Address / Tx Hash"/>
<button onclick="scan()">Search</button>
<div id="result"></div>
</div>

<div class="card">
<h3>Connect</h3>
<i class="fab fa-x-twitter icon" onclick="go('https://x.com/pawansatoshix')"></i>
<i class="fab fa-github icon" onclick="go('https://github.com/pawansatoshi')"></i>
<i class="fab fa-youtube icon" onclick="go('https://youtube.com/@PawanSatoshi')"></i>
<i class="fab fa-telegram icon" onclick="go('https://t.me/pawansatoshi')"></i>
<i class="fas fa-envelope icon" onclick="go('mailto:pawansatoshi@gmail.com')"></i>
<i class="fab fa-discord icon" onclick="go('https://discord.com/channels/1214957080218435634/1214957080654512250')"></i>
</div>

<script>
const ARC_CHAIN = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC = "0x3600000000000000000000000000000000000000";
const DECIMALS = 6;

let provider, signer, user;

// ✅ Farcaster-safe navigation
function go(u){
  window.location.href = u;
}

// CONNECT
async function connect(){
 try{
  if(!window.ethereum){
    document.getElementById("status").innerText = "Wallet not available here";
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);

  signer = provider.getSigner();
  user = await signer.getAddress();

  document.getElementById("addr").innerText = user;
  document.getElementById("status").innerText="Connected";

  await loadBalance();

 }catch(e){
  document.getElementById("status").innerText=e.message;
 }
}

// SWITCH NETWORK
async function switchArc(){
 try{
  if(!window.ethereum){
    document.getElementById("status").innerText = "Wallet not available";
    return;
  }

  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:ARC_CHAIN}]
  });
 }catch{
  await window.ethereum.request({
   method:"wallet_addEthereumChain",
   params:[{
    chainId:ARC_CHAIN,
    chainName:"Arc Testnet",
    rpcUrls:[ARC_RPC],
    nativeCurrency:{name:"USDC",symbol:"USDC",decimals:6}
   }]
  });
 }
}

// BALANCE
async function loadBalance(){
 try{
  if(!provider || !user) return;

  const contract = new ethers.Contract(USDC,[
    "function balanceOf(address) view returns(uint256)"
  ],provider);

  const bal = await contract.balanceOf(user);

  document.getElementById("bal").innerText =
    ethers.utils.formatUnits(bal, DECIMALS)+" USDC";

 }catch{
  document.getElementById("bal").innerText="Balance error";
 }
}

// SEND
async function send(){
 try{
  if(!signer){
    alert("Connect wallet first");
    return;
  }

  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if(!to || !amount) return alert("Enter valid details");

  const contract = new ethers.Contract(USDC,[
    "function transfer(address,uint256) returns(bool)"
  ],signer);

  const amt = ethers.utils.parseUnits(amount, DECIMALS);
  const tx = await contract.transfer(to, amt);

  document.getElementById("status").innerText="Tx: "+tx.hash;

 }catch(e){
  document.getElementById("status").innerText=e.message;
 }
}

// SCANNER
function isAddress(x){return /^0x[a-fA-F0-9]{40}$/.test(x)}
function isTx(x){return /^0x([A-Fa-f0-9]{64})$/.test(x)}

async function scan(){
 const q=document.getElementById("search").value.trim();
 const out=document.getElementById("result");
 out.innerHTML="Loading...";

 try{
  const p = window.ethereum;

  if(!p){
    out.innerHTML="Scanner not supported here";
    return;
  }

  if(isTx(q)){
   const tx = await p.request({
    method:"eth_getTransactionByHash",
    params:[q]
   });

   if(!tx){out.innerHTML="Not found";return;}

   out.innerHTML=`
   <b>Hash:</b> ${tx.hash}<br>
   <b>From:</b> ${tx.from}<br>
   <b>To:</b> ${tx.to}<br>
   <b>Value:</b> ${parseInt(tx.value,16)/1e6} USDC<br>
   `;
   return;
  }

  if(isAddress(q)){
   const bal = await p.request({
    method:"eth_call",
    params:[{
      to: USDC,
      data: "0x70a08231"+q.slice(2).padStart(64,'0')
    },"latest"]
   });

   let balance = parseInt(bal,16)/1e6;

   out.innerHTML=`<b>Balance:</b> ${balance} USDC<br>`;
   return;
  }

  out.innerHTML="Invalid input";

 }catch{
  out.innerHTML="Error";
 }
}
</script>

</body>
  </html>
