<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- Ethers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- Web3Modal -->
  <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>

  <!-- WalletConnect -->
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>ArcFlow</h1>
<p>Universal Wallet Support (Arc Testnet)</p>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="balance">Balance: --</p>

<input id="address" placeholder="Recipient address" />
<input id="amount" placeholder="Amount (USDC)" />

<button onclick="send()">Send Smart</button>

<p id="status"></p>

<script>

// ================= CONFIG =================

const ARC_CHAIN_ID = 5042002;
const ARC_CHAIN_ID_HEX = "0x4CE3CA";
const ARC_RPC = "https://rpc.testnet.arc.network";
const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";

// ==========================================

const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)",
  "function balanceOf(address owner) view returns (uint256)"
];

let provider;
let signer;
let userAddress;

// 🔥 WEB3MODAL SETUP
const providerOptions = {
  walletconnect: {
    package: window.WalletConnectProvider.default,
    options: {
      rpc: {
        5042002: ARC_RPC
      }
    }
  }
};

const web3Modal = new window.Web3Modal.default({
  cacheProvider: false,
  providerOptions
});

// 🔹 CONNECT (ALL WALLETS FIXED)
async function connectWallet() {
  try {
    const instance = await web3Modal.connect();

    provider = new ethers.providers.Web3Provider(instance, "any");

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    await ensureArcNetwork();

    document.getElementById("status").innerText =
      "Connected: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText =
      err.message;
  }
}

// 🔹 ENSURE NETWORK
async function ensureArcNetwork() {
  try {
    const network = await provider.getNetwork();

    if (network.chainId !== ARC_CHAIN_ID) {
      await provider.send("wallet_switchEthereumChain", [
        { chainId: ARC_CHAIN_ID_HEX }
      ]);
    }

  } catch (err) {
    await provider.send("wallet_addEthereumChain", [{
      chainId: ARC_CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      rpcUrls: [ARC_RPC],
      nativeCurrency: {
        name: "USDC",
        symbol: "USDC",
        decimals: 18
      },
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    }]);
  }
}

// 🔹 BALANCE
async function loadBalance() {
  const usdc = new ethers.Contract(
    USDC_ADDRESS,
    ERC20_ABI,
    provider
  );

  const bal = await usdc.balanceOf(userAddress);
  const dec = await usdc.decimals();

  document.getElementById("balance").innerText =
    "Balance: " + ethers.utils.formatUnits(bal, dec) + " USDC";
}

// 🔹 ROUTE
function smartRoute(amount) {
  return amount < 50 ? "direct" : "bridge";
}

// 🔹 SEND
async function send() {
  try {
    const to = document.getElementById("address").value;
    const amount = document.getElementById("amount").value;

    if (!to || !amount) return alert("Enter values");

    const route = smartRoute(parseFloat(amount));

    if (route === "direct") {

      const usdc = new ethers.Contract(
        USDC_ADDRESS,
        ERC20_ABI,
        signer
      );

      const dec = await usdc.decimals();
      const amt = ethers.utils.parseUnits(amount, dec);

      const tx = await usdc.transfer(to, amt);

      document.getElementById("status").innerText =
        "Tx: " + tx.hash;

    } else {
      document.getElementById("status").innerText =
        "Bridge route (next)";
    }

  } catch (err) {
    document.getElementById("status").innerText =
      err.message;
  }
}

</script>

</body>
</html>
