<!DOCTYPE html>
<html>
<head>
  <title>ArcFlow</title>

  <!-- Ethers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- WalletConnect v2 -->
  <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.min.js"></script>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
      max-width: 320px;
    }

    button {
      background: #00c2ff;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>ArcFlow</h1>
<p>Universal Wallet Support (Arc Testnet)</p>

<button onclick="connectInjected()">Connect Wallet</button>
<button onclick="connectWC()">WalletConnect</button>

<p id="status">Not connected</p>
<p id="balance">Balance: --</p>

<input id="address" placeholder="Recipient address" />
<input id="amount" placeholder="Amount (USDC)" />

<button onclick="send()">Send Smart</button>

<script>

// ===== CONFIG =====
const ARC_CHAIN_ID = 5042002;
const ARC_RPC = "https://rpc.testnet.arc.network";
const PROJECT_ID = "a0031066837361c93d02ae2f139acc98";
const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";

// ⚠️ FIX: Arc USDC uses 6 decimals (NOT dynamic)
const DECIMALS = 6;

const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function balanceOf(address owner) view returns (uint256)"
];

let provider, signer, userAddress;

// ===== INJECTED =====
async function connectInjected() {
  try {
    if (!window.ethereum) return alert("No wallet found");

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("status").innerText =
      "Injected: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

// ===== WALLETCONNECT FIX =====
async function connectWC() {
  try {
    const EthereumProvider = window["@walletconnect/ethereum-provider"].EthereumProvider;

    const wcProvider = await EthereumProvider.init({
      projectId: PROJECT_ID,
      chains: [ARC_CHAIN_ID],
      rpcMap: {
        [ARC_CHAIN_ID]: ARC_RPC
      },
      showQrModal: true, // desktop QR
    });

    await wcProvider.enable();

    provider = new ethers.providers.Web3Provider(wcProvider);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("status").innerText =
      "WalletConnect: " + userAddress;

    loadBalance();

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

// ===== BALANCE (FIXED) =====
async function loadBalance() {
  try {
    const usdc = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider);

    const bal = await usdc.balanceOf(userAddress);

    document.getElementById("balance").innerText =
      "Balance: " + ethers.utils.formatUnits(bal, DECIMALS) + " USDC";

  } catch (e) {
    document.getElementById("balance").innerText =
      "Balance load failed";
  }
}

// ===== SEND (FIXED) =====
async function send() {
  try {
    const to = document.getElementById("address").value;
    const amount = document.getElementById("amount").value;

    if (!to || !amount) return alert("Enter values");

    const usdc = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, signer);

    const amt = ethers.utils.parseUnits(amount, DECIMALS);

    const tx = await usdc.transfer(to, amt);

    document.getElementById("status").innerText =
      "Tx sent: " + tx.hash;

  } catch (err) {
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
  </html>
